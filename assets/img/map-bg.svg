<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <!-- 手繪風世界地圖浮水印：淡色線稿＋虛線航線＋紙飛機（僅裝飾，內容層永遠在其上） -->
  <g stroke="#3d3a34" stroke-opacity=".075" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- 北美洲 -->
    <path d="M120 145 C 95 118, 135 78, 200 88 C 258 68, 320 88, 332 128 C 362 140, 342 178, 302 188 C 288 226, 244 250, 222 220 C 182 240, 138 202, 120 145 Z"/>
    <!-- 南美洲 -->
    <path d="M298 302 C 328 278, 362 298, 356 340 C 372 382, 342 432, 320 452 C 298 472, 278 430, 284 390 C 268 348, 278 320, 298 302 Z"/>
    <!-- 格陵蘭 -->
    <path d="M360 60 C 380 45, 415 48, 420 70 C 415 92, 385 98, 368 88 C 355 78, 352 68, 360 60 Z"/>
    <!-- 歐洲 -->
    <path d="M560 122 C 580 100, 620 94, 640 110 C 662 100, 682 116, 670 136 C 650 156, 610 162, 590 150 C 568 156, 548 140, 560 122 Z"/>
    <!-- 非洲 -->
    <path d="M560 200 C 600 178, 652 190, 672 222 C 692 262, 682 322, 652 362 C 632 402, 600 412, 584 380 C 558 340, 544 258, 560 200 Z"/>
    <!-- 亞洲 -->
    <path d="M700 100 C 758 68, 858 68, 920 98 C 992 108, 1042 150, 1020 192 C 1000 232, 940 242, 898 220 C 858 252, 798 240, 768 210 C 718 190, 688 140, 700 100 Z"/>
    <!-- 東南亞島嶼 -->
    <path d="M880 290 C 898 282, 918 288, 920 300 C 916 312, 894 314, 884 306 C 876 300, 874 294, 880 290 Z"/>
    <path d="M940 310 C 954 304, 968 310, 966 320 C 960 330, 944 328, 938 320 Z"/>
    <!-- 澳洲 -->
    <path d="M950 382 C 990 360, 1042 370, 1056 402 C 1062 432, 1020 456, 980 450 C 948 444, 934 406, 950 382 Z"/>
    <!-- 紐西蘭 -->
    <path d="M1090 470 C 1100 462, 1112 468, 1108 480 C 1100 490, 1086 484, 1090 470 Z"/>
    <!-- 虛線航線（起點台灣附近 → 越洋弧線） -->
    <path d="M925 235 C 700 60, 420 60, 210 200" stroke-dasharray="7 10" stroke-width="2.8"/>
    <!-- 小愛心圖釘：出發與抵達 -->
    <path d="M925 235 c 3 -6, 11 -4, 9 3 c -1 4, -6 7, -9 9 c -3 -2, -8 -5, -9 -9 c -2 -7, 6 -9, 9 -3 Z"/>
    <path d="M210 200 c 3 -6, 11 -4, 9 3 c -1 4, -6 7, -9 9 c -3 -2, -8 -5, -9 -9 c -2 -7, 6 -9, 9 -3 Z"/>
  </g>
  <!-- 紙飛機（沿航線飛行方向） -->
  <g fill="#3d3a34" fill-opacity=".09" transform="translate(555 78) rotate(-8)">
    <path d="M0 0 L 46 10 L 8 24 L 6 15 Z"/>
    <path d="M8 24 L 12 36 L 16 22 Z"/>
  </g>
</svg>
